<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quiz-container" id="quiz-card">
        <div class="quiz-header">
            <div class="progress-container">
                <div class="progress-bar" id="progress"></div>
            </div>
            <div class="timer" id="timer-text">15s</div>
        </div>

        <div class="question-section">
            <h2 id="question">Question text goes here?</h2>
        </div>

        <div class="options-container" id="options">
        </div>

        
        <div class="quiz-footer">
            <span id="question-counter">Question 1 of 5</span>
            <button id="next-btn" class="btn hidden">Next Question</button>
        </div>
    </div>

    
    <div class="results-container hidden" id="results-card">
        <h2>Quiz Completed!</h2>
        <p class="score-text">You scored <span id="final-score">0</span> out of <span id="total-questions">0</span></p>
        <button id="restart-btn" class="btn">Try Again</button>
    </div>

<div class="quiz-container">

</div>


<footer class="footer-credit">
    Made by Alina ❤️
</footer>

</body>
</html>
